<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    text-align:center;
    color:white;
}

h1{
    margin-top:40px;
    font-size:3rem;
    animation: bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-15px)}
}

#message{
    font-size:1.4rem;
    margin-top:10px;
}

#score{
    font-size:1.6rem;
    margin-top:20px;
}

.heart{
    position:absolute;
    font-size:30px;
    cursor:pointer;
    animation: floatUp 3s linear forwards;
}

@keyframes floatUp{
    from{transform:translateY(0);opacity:1}
    to{transform:translateY(-200px);opacity:0}
}

.balloon{
    position:absolute;
    bottom:-150px;
    font-size:50px;
    animation: rise 10s linear infinite;
}

@keyframes rise{
    from{bottom:-150px}
    to{bottom:110%}
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
    margin-top:15px;
}

#gameArea{
    position:relative;
    width:100%;
    height:60vh;
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday My Love 🎉</h1>

<div id="message">
You make my world brighter every day ❤️<br>
Catch the hearts before they disappear!
</div>

<div id="score">Score: 0</div>

<button onclick="startGame()">Start Birthday Game</button>

<div id="gameArea"></div>

<script>

let score = 0
let gameRunning = false

function startGame(){
    score = 0
    gameRunning = true
    document.getElementById("score").innerText = "Score: " + score

    spawnHearts()
}

function spawnHearts(){
    if(!gameRunning) return

    const heart = document.createElement("div")
    heart.classList.add("heart")
    heart.innerHTML = "❤️"

    heart.style.left = Math.random()*90 + "%";
    heart.style.top = Math.random()*70 + "%";

    heart.onclick = () => {
        score++
        document.getElementById("score").innerText = "Score: " + score
        heart.remove()
    }

    document.getElementById("gameArea").appendChild(heart)

    setTimeout(()=>heart.remove(),3000)

    setTimeout(spawnHearts,700)
}

function createBalloons(){
    const balloon = document.createElement("div")
    balloon.classList.add("balloon")
    balloon.innerHTML = "🎈"

    balloon.style.left = Math.random()*100 + "%"

    document.body.appendChild(balloon)

    setTimeout(()=>balloon.remove(),10000)
}

setInterval(createBalloons,1500)

</script>

</body>
</html>
