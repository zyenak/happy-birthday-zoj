<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Pyu Pyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">
    <style>
        :root {
            --sand: #f4e6d4;
            --beige: #e8d7b9;
            --ocean: #5f9ea0;
            --deepOcean: #3c6e71;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--sand), var(--beige));
            color: #333;
            text-align: center;
            overflow: hidden;
            height: 100vh;
        }

        /* Responsive Typography */
        h1 { margin-top: 20px; font-size: 1.8rem; color: var(--deepOcean); }
        #score { font-size: 1.1rem; margin-bottom: 10px; }

        #gameArea {
            position: relative;
            width: 100%;
            height: 70vh;
            touch-action: manipulation; /* Prevents zooming on mobile taps */
        }

        /* Responsive Hearts */
        .heart {
            position: absolute;
            font-size: 50px; /* Smaller default */
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        @media (max-width: 600px) {
            .heart { font-size: 40px; }
            h1 { font-size: 1.4rem; }
            #letter { font-size: 1rem !important; padding: 15px !important; }
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 45px;
            transition: opacity 1s ease;
            z-index: 1;
        }

        /* Final Screen Overlay */
        #finalScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #letter {
            max-width: 90%;
            width: 500px;
            font-family: "Libre Baskerville", serif;
            font-size: 1.1rem;
            line-height: 1.6;
            white-space: pre-line; /* Keeps line breaks from the string */
            text-align: center;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            background: var(--ocean);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>

    <h1 id="title">Happy Birthday Pyu Pyu</h1>
    <div id="score">Score: 0</div>
    <button id="gameBtn" onclick="startGame()">Start Catching ❤️</button>

    <div id="gameArea"></div>

    <div id="finalScreen">
        <div id="letter"></div>
        <button id="backBtn" style="display:none;" onclick="location.reload()">Play Again</button>
    </div>

    <canvas id="confetti"></canvas>

<script>
    let score = 0;
    let running = false;
    let isEnding = false;
    let spawnLoop;
    let balloonLoop;
    const gameArea = document.getElementById("gameArea");

    // --- GAME LOGIC ---

    function startGame() {
        score = 0;
        running = true;
        isEnding = false;
        document.getElementById("score").innerText = "Score: " + score;
        document.getElementById("gameBtn").style.display = "none";
        
        // Clear previous state
        gameArea.innerHTML = "";
        
        spawnLoop = setInterval(spawnHeart, 1000);
        balloonLoop = setInterval(spawnBalloon, 2000);

        setTimeout(endGame, 10000); // 10 second game
    }

    function spawnHeart() {
        if (!running) return;
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 80 + 10 + "%";
        heart.style.top = Math.random() * 70 + 10 + "%";
        
        heart.onclick = () => {
            score++;
            document.getElementById("score").innerText = "Score: " + score;
            heart.style.transform = "scale(1.5)";
            heart.style.opacity = "0";
            setTimeout(() => heart.remove(), 100);
        };
        gameArea.appendChild(heart);
        setTimeout(() => heart && heart.remove(), 2000);
    }

    function spawnBalloon() {
        if (isEnding) return;
        const b = document.createElement("div");
        b.className = "balloon";
        b.innerHTML = "🎈";
        b.style.left = Math.random() * 90 + "%";
        document.body.appendChild(b);

        let pos = -100;
        let id = setInterval(() => {
            if (pos > window.innerHeight + 100 || isEnding) {
                clearInterval(id);
                b.style.opacity = "0";
                setTimeout(() => b.remove(), 1000);
            } else {
                pos += 2;
                b.style.bottom = pos + "px";
            }
        }, 20);
    }

    // --- END SEQUENCE ---

    function endGame() {
        running = false;
        isEnding = true; // Stops new balloons
        clearInterval(spawnLoop);
        
        // 1. Initial Blast
        launchConfetti();

        // 2. Wait for blast to be visible, then show screen
        setTimeout(() => {
            document.getElementById("finalScreen").style.display = "flex";
            // 3. Start Typewriter after a short delay
            setTimeout(showLetter, 1000);
        }, 1500);
    }

    // --- ENHANCED CONFETTI ---

    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function launchConfetti() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                dirX: (Math.random() - 0.5) * 15,
                dirY: (Math.random() - 0.5) * 15 - 5,
                size: Math.random() * 8 + 4,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                gravity: 0.2
            });
        }
        requestAnimationFrame(updateConfetti);
    }

    function updateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.x += p.dirX;
            p.y += p.dirY;
            p.dirY += p.gravity;
            
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);

            if (p.y > canvas.height) particles.splice(i, 1);
        });
        if (particles.length > 0) requestAnimationFrame(updateConfetti);
    }

    // --- TYPEWRITER ---

    function showLetter() {
        const text = `My Pyu Pyu,

        You spent the last few seconds catching hearts, but the truth is… you’ve been catching mine every single day.

        Without even trying, you collect every little piece of it with your kindness, your laugh, and the way you make life feel lighter.

        If love were a game, you’d already have the highest score.

        Happy Birthday ❤️`;

        const el = document.getElementById("letter");
        let i = 0;
        
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 40);
            } else {
                document.getElementById("backBtn").style.display = "block";
            }
        }
        type();
    }
</script>
</body>
</html>
