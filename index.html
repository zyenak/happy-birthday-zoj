<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Pyu Pyu</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

:root{
--bg1:#2f3e2e;
--bg2:#4f6f52;
--accent:#a9b388;
--soft:#dde5d5;
}

body{
margin:0;
font-family:Inter, sans-serif;
background:linear-gradient(160deg,var(--bg1),var(--bg2));
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
text-align:center;
min-height:100vh;
overflow:hidden;
}

/* HEADER */

h1{
margin-top:40px;
font-size:2rem;
font-weight:600;
}

#message{
font-size:1rem;
opacity:.9;
margin-top:5px;
}

#score{
margin-top:12px;
font-size:1.2rem;
}

/* BUTTON */

button{
margin-top:16px;
padding:12px 24px;
border-radius:8px;
border:none;
background:var(--accent);
color:#243222;
font-weight:600;
font-size:1rem;
cursor:pointer;
}

/* GAME AREA */

#gameArea{
position:relative;
width:100%;
height:60vh;
margin-top:10px;
}

/* HEART */

.heart{
position:absolute;
font-size:60px;
cursor:pointer;
animation:float 8s linear forwards;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-280px);opacity:0}
}

/* WHITE SCREEN */

#finalScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* LETTER */

#letter{
max-width:600px;
padding:30px;
color:#333;
font-family:"Playfair Display", serif;
font-size:1.2rem;
line-height:1.7;
opacity:0;
transform:translateY(20px);
transition:all 1s ease;
}

#letter.show{
opacity:1;
transform:translateY(0);
}

/* BACK BUTTON */

#backBtn{
margin-top:20px;
background:#4f6f52;
color:white;
font-size:.9rem;
padding:10px 18px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>Happy Birthday Pyu Pyu</h1>
<div id="message">Catch the hearts ❤️</div>
<div id="score">Score: 0</div>

<button id="gameBtn" onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<div id="finalScreen">
<div id="letter"></div>
<button id="backBtn" onclick="restart()">Back to Game</button>
</div>

<canvas id="confetti"></canvas>

<script>

let score=0
let running=false
let spawnLoop

const gameArea=document.getElementById("gameArea")

function startGame(){

score=0
running=true

document.getElementById("score").innerText="Score: "+score
document.getElementById("gameBtn").innerText="Restart Game"

clearInterval(spawnLoop)
spawnLoop=setInterval(spawnHeart,1200)

setTimeout(endGame,15000)

}

function spawnHeart(){

if(!running) return

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*85+"%"
heart.style.top=Math.random()*60+"%"

heart.onclick=()=>{
score++
document.getElementById("score").innerText="Score: "+score
heart.remove()
}

gameArea.appendChild(heart)

setTimeout(()=>heart.remove(),8000)

}

/* END GAME */

function endGame(){

running=false
clearInterval(spawnLoop)

document.getElementById("finalScreen").style.display="flex"

launchConfetti()

setTimeout(showLetter,2500)

}

/* CONFETTI */

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let confetti=[]

function launchConfetti(){

for(let i=0;i<200;i++){

confetti.push({
x:Math.random()*canvas.width,
y:-20,
r:Math.random()*6+4,
d:Math.random()*50,
color:`hsl(${Math.random()*360},70%,60%)`,
tilt:Math.random()*10
})

}

animateConfetti()

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x,c.y,c.r,0,Math.PI*2)
ctx.fillStyle=c.color
ctx.fill()

c.y+=3
})

requestAnimationFrame(animateConfetti)

}

/* LETTER */

function showLetter(){

const text=`My Pyu Pyu,

Every little heart you caught is a reminder
of how many reasons I have to love you.

You make ordinary days feel softer,
warmer, and brighter in ways
I never knew were possible.

I’m endlessly grateful for you,
for your kindness,
your laughter,
and the way you make life feel like home.

Happy Birthday ❤️`

const letter=document.getElementById("letter")

typeWriter(letter,text,0)

}

function typeWriter(el,text,i){

if(i<text.length){
el.innerHTML+=text.charAt(i)
el.classList.add("show")
setTimeout(()=>typeWriter(el,text,i+1),25)
}

}

/* BACK */

function restart(){

location.reload()

}

</script>

</body>
</html>
