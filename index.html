<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Pyu Pyu</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

:root{
--sand:#f4e6d4;
--beige:#e8d7b9;
--ocean:#5f9ea0;
--deepOcean:#3c6e71;
--driftwood:#8d6e63;
}

body{
margin:0;
font-family:Inter, sans-serif;
background:linear-gradient(180deg,var(--sand),var(--beige));
color:#333;
text-align:center;
overflow:hidden;
}

h1{
margin-top:30px;
font-size:2rem;
font-weight:600;
color:var(--deepOcean);
}

#message{
margin-top:5px;
color:#555;
}

#score{
margin-top:10px;
font-size:1.2rem;
}

button{
margin-top:15px;
padding:12px 24px;
border:none;
border-radius:8px;
background:var(--ocean);
color:white;
font-weight:600;
cursor:pointer;
}

#gameArea{
position:relative;
width:100%;
height:60vh;
}

/* HEARTS */

.heart{
position:absolute;
font-size:65px;
cursor:pointer;
animation:floatUp 9s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0)}
100%{transform:translateY(-300px);opacity:0}
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-120px;
font-size:55px;
animation:rise 14s linear infinite;
}

@keyframes rise{
0%{bottom:-120px}
100%{bottom:110%}
}

/* FINAL SCREEN */

#finalScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* LETTER */

#letter{
max-width:650px;
padding:30px;
font-family:"Libre Baskerville", serif;
font-size:1.2rem;
line-height:1.8;
color:#333;
opacity:0;
transform:translateY(20px);
transition:all 1s ease;
}

#letter.show{
opacity:1;
transform:translateY(0);
}

#backBtn{
margin-top:20px;
background:var(--deepOcean);
}

/* CONFETTI CANVAS */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>Happy Birthday Pyu Pyu</h1>
<div id="message">Catch as many hearts as you can ❤️</div>
<div id="score">Score: 0</div>

<button id="gameBtn" onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<div id="finalScreen">
<div id="letter"></div>
<button id="backBtn" onclick="restart()">Back to Game</button>
</div>

<canvas id="confetti"></canvas>

<script>

let score=0
let running=false
let spawnLoop

const gameArea=document.getElementById("gameArea")

/* GAME */

function startGame(){

score=0
running=true

document.getElementById("score").innerText="Score: "+score
document.getElementById("gameBtn").innerText="Restart Game"

clearInterval(spawnLoop)
spawnLoop=setInterval(spawnHeart,1300)

setTimeout(endGame,15000)

}

/* HEARTS */

function spawnHeart(){

if(!running) return

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*85+"%"
heart.style.top=Math.random()*60+"%"

heart.onclick=()=>{
score++
document.getElementById("score").innerText="Score: "+score
heart.remove()
}

gameArea.appendChild(heart)

setTimeout(()=>heart.remove(),9000)

}

/* BALLOONS */

function createBalloon(){

const balloon=document.createElement("div")
balloon.className="balloon"

const colors=["🎈","🎈","🎈","🎈","🎈"]

balloon.innerHTML=colors[Math.floor(Math.random()*colors.length)]

balloon.style.left=Math.random()*100+"%"

document.body.appendChild(balloon)

setTimeout(()=>balloon.remove(),14000)

}

setInterval(createBalloon,2200)

/* END GAME */

function endGame(){

running=false
clearInterval(spawnLoop)

document.getElementById("finalScreen").style.display="flex"

launchConfetti()

setTimeout(showLetter,2500)

}

/* CONFETTI */

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let confetti=[]

function launchConfetti(){

for(let i=0;i<350;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height-500,
size:Math.random()*8+4,
speed:Math.random()*3+2,
color:`hsl(${Math.random()*360},70%,60%)`
})

}

animateConfetti()

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(c=>{
ctx.fillStyle=c.color
ctx.fillRect(c.x,c.y,c.size,c.size)

c.y+=c.speed

if(c.y>canvas.height){
c.y=-10
}
})

requestAnimationFrame(animateConfetti)

}

/* LETTER */

function showLetter(){

const text=`My Pyu Pyu,

You spent the last few seconds catching hearts,
but the truth is…

you’ve been catching mine
every single day.

Without even trying,
you collect every little piece of it
with your kindness,
your laugh,
and the way you make life feel lighter.

If love were a game,
you’d already have the highest score.

Happy Birthday ❤️`

const letter=document.getElementById("letter")

typeWriter(letter,text,0)

}

/* TYPEWRITER */

function typeWriter(el,text,i){

if(i<text.length){

el.innerHTML+=text.charAt(i)
el.classList.add("show")

setTimeout(()=>typeWriter(el,text,i+1),28)

}

}

/* RESTART */

function restart(){
location.reload()
}

</script>

</body>
</html>
