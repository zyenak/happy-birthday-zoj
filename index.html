<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Pyu Pyu</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">

    <style>
        :root {
            --sand: #f4e6d4;
            --beige: #e8d7b9;
            --ocean: #5f9ea0;
            --deepOcean: #3c6e71;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--sand), var(--beige));
            color: #333;
            text-align: center;
            overflow: hidden;
            height: 100vh;
        }

        h1 { margin-top: 20px; font-size: 1.8rem; color: var(--deepOcean); padding: 0 10px; }
        #score { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }

        #gameArea {
            position: relative;
            width: 100%;
            height: 65vh;
            touch-action: none; /* Critical for mobile responsiveness */
        }

        /* Responsive Moving Hearts */
        .heart {
            position: absolute;
            font-size: 35px; /* Perfect size for mobile */
            cursor: pointer;
            user-select: none;
            animation: floatAround 4s ease-in-out infinite alternate;
            transition: opacity 0.2s;
        }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(20px, -30px) rotate(15deg); }
        }

        @media (min-width: 1024px) {
            .heart { font-size: 45px; } /* Slightly bigger for laptop */
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 40px;
            transition: opacity 1s ease;
            z-index: 1;
        }

        /* Final Screen */
        #finalScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #letter {
            max-width: 85%;
            width: 550px;
            font-family: "Libre Baskerville", serif;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #444;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 30px;
            background: var(--ocean);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>Happy Birthday Pyu Pyu</h1>
    <div id="score">Score: 0</div>
    <button id="gameBtn" onclick="startGame()">Start Game ❤️</button>

    <div id="gameArea"></div>

    <div id="finalScreen">
        <div id="letter"></div>
        <button id="backBtn" style="display:none; margin-top: 30px;" onclick="location.reload()">Restart</button>
    </div>

<script>
    let score = 0;
    let running = false;
    let isEnding = false;
    let spawnLoop;
    let balloonLoop;
    const gameArea = document.getElementById("gameArea");

    function startGame() {
        score = 0;
        running = true;
        isEnding = false;
        document.getElementById("score").innerText = "Score: " + score;
        document.getElementById("gameBtn").style.display = "none";
        
        gameArea.innerHTML = "";
        
        // Faster spawning: Hearts appear every 600ms
        spawnLoop = setInterval(spawnHeart, 600);
        balloonLoop = setInterval(spawnBalloon, 1800);

        setTimeout(endGame, 12000); // 12 second game
    }

    function spawnHeart() {
        if (!running) return;
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        
        // Random positions within the game area
        const x = Math.random() * (window.innerWidth - 50);
        const y = Math.random() * (gameArea.offsetHeight - 50);
        
        heart.style.left = x + "px";
        heart.style.top = y + "px";
        
        // Tap/Click logic
        const collect = () => {
            score++;
            document.getElementById("score").innerText = "Score: " + score;
            heart.style.opacity = "0";
            setTimeout(() => heart.remove(), 200);
        };

        heart.addEventListener('mousedown', collect);
        heart.addEventListener('touchstart', (e) => { e.preventDefault(); collect(); });

        gameArea.appendChild(heart);
        // Hearts disappear after 2.5 seconds if not caught
        setTimeout(() => { if(heart.parentElement) heart.remove(); }, 2500);
    }

    function spawnBalloon() {
        if (isEnding) return;
        const b = document.createElement("div");
        b.className = "balloon";
        b.innerHTML = "🎈";
        b.style.left = Math.random() * 90 + "%";
        document.body.appendChild(b);

        let pos = -100;
        let speed = 2 + Math.random() * 2;
        let id = setInterval(() => {
            if (pos > window.innerHeight + 100 || isEnding) {
                clearInterval(id);
                b.style.opacity = "0";
                setTimeout(() => b.remove(), 500);
            } else {
                pos += speed;
                b.style.bottom = pos + "px";
            }
        }, 20);
    }

    function endGame() {
        running = false;
        isEnding = true;
        clearInterval(spawnLoop);
        
        // 1. Initial professional confetti blast
        const duration = 3 * 1000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 5,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#5f9ea0', '#ff7096', '#ffffff']
            });
            confetti({
                particleCount: 5,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#5f9ea0', '#ff7096', '#ffffff']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());

        // 2. Clear screen and show letter
        setTimeout(() => {
            document.getElementById("finalScreen").style.display = "flex";
            showLetter();
        }, 2500);
    }

    function showLetter() {
        const text = `My Pyu Pyu,\n\nYou spent the last few seconds catching hearts, but the truth is… you’ve been catching mine every single day.\n\nWithout even trying, you collect every little piece of it with your kindness, your laugh, and the way you make life feel lighter.\n\nIf love were a game, you’d already have the highest score.\n\nHappy Birthday ❤️`;

        const el = document.getElementById("letter");
        let i = 0;
        
        function type() {
            if (i < text.length) {
                // Handling new lines correctly
                if (text.charAt(i) === '\n') {
                    el.innerHTML += '<br>';
                } else {
                    el.innerHTML += text.charAt(i);
                }
                i++;
                setTimeout(type, 45);
            } else {
                document.getElementById("backBtn").style.display = "block";
            }
        }
        type();
    }
</script>
</body>
</html>
