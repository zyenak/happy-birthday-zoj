<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Pyu Pyu ❤️</title>

<style>

body{
margin:0;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(135deg,#ffb6c1,#ffd6ec,#ffe4f3);
text-align:center;
overflow:hidden;
color:#fff;
}

h1{
font-size:2.8rem;
margin-top:30px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

#message{
font-size:1.2rem;
padding:10px 25px;
}

#score{
font-size:1.4rem;
margin-top:10px;
}

button{
padding:14px 26px;
border:none;
border-radius:25px;
font-size:1.1rem;
background:#ff4d8d;
color:white;
cursor:pointer;
margin-top:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#gameArea{
position:relative;
width:100%;
height:65vh;
overflow:hidden;
}

/* HEARTS */

.heart{
position:absolute;
font-size:55px;
cursor:pointer;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0);opacity:1}
to{transform:translateY(-250px);opacity:0}
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-120px;
font-size:60px;
animation:rise 12s linear infinite;
}

@keyframes rise{
from{bottom:-120px}
to{bottom:110%}
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
background:white;
animation:fall 3s linear forwards;
}

@keyframes fall{
from{transform:translateY(-100px)}
to{transform:translateY(100vh)}
}

/* FINAL MESSAGE */

#finalMessage{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:1.6rem;
display:none;
padding:20px;
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday Pyu Pyu 🎉</h1>

<div id="message">
Catch the hearts before they float away ❤️
</div>

<div id="score">Score: 0</div>

<button id="gameButton" onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<div id="finalMessage"></div>

<script>

let score=0
let gameRunning=false
let spawnLoop

function startGame(){

score=0
gameRunning=true
document.getElementById("score").innerText="Score: "+score

document.getElementById("gameButton").innerText="Restart Game"

document.getElementById("finalMessage").style.display="none"

clearInterval(spawnLoop)

spawnLoop=setInterval(spawnHeart,900)

setTimeout(endGame,20000)

}

function spawnHeart(){

if(!gameRunning) return

const heart=document.createElement("div")

heart.classList.add("heart")
heart.innerHTML="❤️"

heart.style.left=Math.random()*85+"%"
heart.style.top=Math.random()*65+"%"

heart.onclick=()=>{

score++
document.getElementById("score").innerText="Score: "+score
heart.remove()

}

document.getElementById("gameArea").appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

function endGame(){

gameRunning=false
clearInterval(spawnLoop)

confettiExplosion()

const msg=document.getElementById("finalMessage")

msg.innerHTML=
`
💖 My sweetest Pyu Pyu 💖 <br><br>

Every heart you caught is one reason<br>
why I love you more each day.<br><br>

You make my world softer,<br>
brighter, and infinitely happier. 🌸<br><br>

Happy Birthday my love ❤️
`

msg.style.display="block"

}

function confettiExplosion(){

for(let i=0;i<120;i++){

const conf=document.createElement("div")

conf.classList.add("confetti")

conf.style.left=Math.random()*100+"%"
conf.style.background=`hsl(${Math.random()*360},80%,60%)`

document.body.appendChild(conf)

setTimeout(()=>conf.remove(),3000)

}

}

function createBalloon(){

const balloon=document.createElement("div")

balloon.classList.add("balloon")

balloon.innerHTML="🎈"

balloon.style.left=Math.random()*100+"%"

document.body.appendChild(balloon)

setTimeout(()=>balloon.remove(),12000)

}

setInterval(createBalloon,2000)

</script>

</body>
</html>
